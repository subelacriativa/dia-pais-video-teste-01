<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Mensagem Especial ❤️</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        /* Instrução inicial para o usuário na tela */
        #instrucao {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 94, 98, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 999;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            font-size: 0.9rem;
            font-weight: bold;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div id="instrucao">Apunte a câmera para a foto na caneca e veja a mágica! ✨</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="video-crianca" src="LINK_DO_SEU_VIDEO_AQUI.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro" id="marcador">
            <a-video src="#video-crianca" width="1.5" height="1.5" position="0 0.5 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Código para dar Play no vídeo automaticamente quando a câmera reconhecer o marcador da caneca
        const marcador = document.querySelector('#marcador');
        const video = document.querySelector('#video-crianca');

        marcador.addEventListener('markerFound', function() {
            video.play();
        });

        marcador.addEventListener('markerLost', function() {
            video.pause();
        });
    </script>
</body>
</html>
